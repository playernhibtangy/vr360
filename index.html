<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Pan & Zoom Player</title>
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link href="https://unpkg.com/videojs-vr/dist/videojs-vr.css" rel="stylesheet">
  
  <link href="style.css" rel="stylesheet" />
</head>
<body>

<div class="container">
  <div class="player-section">
    <div id="video-container"></div>
    
    <div class="controls-bar">
      <div class="pad-controller">
        <button class="pad-btn" id="zoomOutBtn" title="Zoom Out">➖</button>
        <button class="pad-btn" id="btnUp" title="Up">⬆️</button>
        <button class="pad-btn" id="zoomInBtn" title="Zoom In">➕</button>
        
        <button class="pad-btn" id="btnLeft" title="Left">⬅️</button>
        <button class="pad-btn" id="btnDown" title="Down">⬇️</button>
        <button class="pad-btn" id="btnRight" title="Right">➡️</button>
      </div>

      <div class="main-controls">
        <button id="resetBtn">⟲ Reset View</button>
        <button id="modeBtn" style="background:#444;">Mode: Normal</button>
        <button id="nextBtn">Next ▶</button>
        <button id="loadBtn">📁 Load Videos</button>
      </div>

      <input type="file" id="folderPicker" multiple accept="video/*" style="display:none;">
    </div>
  </div>

  <div class="sidebar">
    <div id="playlist"></div>
  </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://unpkg.com/videojs-vr/dist/videojs-vr.min.js"></script>

<script src="app.js"></script>

</body>
</html>
